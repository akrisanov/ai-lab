apiVersion: apps/v1
kind: Deployment
metadata:
  name: infer
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infer
  template:
    metadata:
      labels:
        app: infer
    spec:
      containers:
        - name: infer
          image: python:3.11-slim
          command: [ "sh", "-c" ]
          args:
            - |
              pip install -q flask && python /app/app.py
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            limits:
              nvidia.com/gpu: 1
      volumes:
        - name: app
          configMap:
            name: infer-app
