apiVersion: v1
kind: Pod
metadata:
  name: pytorch-gpu-test
spec:
  runtimeClassName: nvidia
  restartPolicy: Never
  containers:
    - name: worker
      image: python:3.14-slim
      command: [ "/bin/sh", "-lc" ]
      args:
        - |
          python -m pip install --no-cache-dir --upgrade pip setuptools wheel typing-extensions
          python -m pip install --no-cache-dir torchvision
          python - <<'PY'
          import torch
          print("torch:", torch.__version__)
          print("cuda available:", torch.cuda.is_available())
          print("device count:", torch.cuda.device_count())
          print("device name:", torch.cuda.get_device_name(0))
          x = torch.ones(1, device="cuda:0")
          print(x)
          PY
      resources:
        limits:
          nvidia.com/gpu: 1
