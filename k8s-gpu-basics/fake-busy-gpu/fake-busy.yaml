apiVersion: v1
kind: Pod
metadata:
  name: fake-busy
spec:
  runtimeClassName: nvidia
  restartPolicy: Never
  containers:
    - name: worker
      image: python:3.14-slim
      command: [ "/bin/sh", "-lc" ]
      args:
        - |
          python -m pip install --no-cache-dir --upgrade pip setuptools wheel typing-extensions
          python -m pip install --no-cache-dir torchvision
          python /app/fake_busy.py
      volumeMounts:
        - name: app
          mountPath: /app
      resources:
        limits:
          nvidia.com/gpu: 1
  volumes:
    - name: app
      configMap:
        name: fake-busy
